name: E2E tests

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
    types: [synchronize]
    paths:
      - '**.php'
      - 'sequra/composer.lock'
      - 'sequra/assets/**'
      - 'sequra/webpack.config.js'
      - 'sequra/package-lock.json'
      - 'sequra/tests-e2e/**'

concurrency:
  group: e2e-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  composer:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v6

      - uses: actions/cache@v5
        id: sequra-composer-prod-cache
        with:
          path: |
            sequra/vendor
            sequra/composer.lock
          key: sequra-composer-prod-cache-${{ hashFiles('sequra/composer.lock', 'sequra/src/**/*.php') }}

      - name: Composer install (sequra)
        if: steps.sequra-composer-prod-cache.outputs.cache-hit != 'true'
        run: |
          cd sequra
          composer install --no-dev --quiet --no-interaction

      - uses: actions/cache@v5
        id: sequra-helper-composer-prod-cache
        with:
          path: |
            sequra-helper/vendor
            sequra-helper/composer.lock
          key: sequra-helper-composer-prod-cache-${{ hashFiles('sequra-helper/composer.lock', 'sequra-helper/src/**/*.php') }}

      - name: Composer install (sequra-helper)
        if: steps.sequra-helper-composer-prod-cache.outputs.cache-hit != 'true'
        run: |
          cd sequra-helper
          composer install --no-dev --quiet --no-interaction

  npm:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v6

      - uses: actions/cache@v5
        id: sequra-npm-cache
        with:
          path: |
            sequra/node_modules
            sequra/package-lock.json
          key: sequra-npm-cache-${{ hashFiles('sequra/package-lock.json') }}
      
      - name: NPM install
        if: steps.sequra-npm-cache.outputs.cache-hit != 'true'
        run: |
          cd sequra
          npm install --silent --no-progress --no-update-notifier

      - uses: actions/cache@v5
        id: sequra-assets-cache
        with:
          path: |
            sequra/assets
          key: sequra-assets-cache-${{ hashFiles('sequra/package-lock.json', 'sequra/webpack.config.js', 'sequra/assets/index.php', 'sequra/assets/js/**/*.js', 'sequra/assets/css/**/*.scss') }}
      
      - name: Build Assets
        if: steps.sequra-assets-cache.outputs.cache-hit != 'true'
        run: |
          cd sequra
          npm run build --silent --no-progress --no-update-notifier

      - uses: actions/cache@v5
        id: playwright-browser-cache
        with:
          path: |
            /home/runner/.cache/ms-playwright
          key: playwright-browser-cache-${{ hashFiles('sequra/package-lock.json') }}

      - name: Install Playwright Browsers
        if: steps.playwright-browser-cache.outputs.cache-hit != 'true'
        run: |
          cd sequra
          npx playwright install chromium-headless-shell --with-deps

  e2e-tests-with-tunnel:
    needs: [composer, npm]
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false || github.event_name == 'workflow_dispatch'

    concurrency:
      group: e2e-cloudflared-tests-${{ matrix.suite }}
      cancel-in-progress: false

    strategy:
      matrix:
        suite: ['001', '002', '003']
        include:
          - suite: '001'
            tunnel_token_secret: CLOUDFLARED_TUNNEL_TOKEN_001
            tunnel_url_secret: CLOUDFLARED_TUNNEL_URL_001
          - suite: '002'
            tunnel_token_secret: CLOUDFLARED_TUNNEL_TOKEN_002
            tunnel_url_secret: CLOUDFLARED_TUNNEL_URL_002
          - suite: '003'
            tunnel_token_secret: CLOUDFLARED_TUNNEL_TOKEN_003
            tunnel_url_secret: CLOUDFLARED_TUNNEL_URL_003
    steps:
      - uses: actions/checkout@v6

      - name: Use vendor cache (sequra)
        uses: actions/cache@v5
        id: sequra-composer-prod-cache
        with:
          path: |
            sequra/vendor
            sequra/composer.lock
          key: sequra-composer-prod-cache-${{ hashFiles('sequra/composer.lock', 'sequra/src/**/*.php') }}

      - name: Use vendor cache (sequra-helper)
        uses: actions/cache@v5
        id: sequra-helper-composer-prod-cache
        with:
          path: |
            sequra-helper/vendor
            sequra-helper/composer.lock
          key: sequra-helper-composer-prod-cache-${{ hashFiles('sequra-helper/composer.lock', 'sequra-helper/src/**/*.php') }}

      - name: Use node_modules cache
        uses: actions/cache@v5
        id: sequra-npm-cache
        with:
          path: |
            sequra/node_modules
            sequra/package-lock.json
          key: sequra-npm-cache-${{ hashFiles('sequra/package-lock.json') }}

      - name: Use assets cache
        uses: actions/cache@v5
        id: sequra-assets-cache
        with:
          path: |
            sequra/assets
          key: sequra-assets-cache-${{ hashFiles('sequra/package-lock.json', 'sequra/webpack.config.js', 'sequra/assets/index.php', 'sequra/assets/js/**/*.js', 'sequra/assets/css/**/*.scss') }}

      - name: Use Playwright browser cache
        uses: actions/cache@v5
        id: playwright-browser-cache
        with:
          path: |
            /home/runner/.cache/ms-playwright
          key: playwright-browser-cache-${{ hashFiles('sequra/package-lock.json') }}

      - name: Setup the environment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DUMMY_ASSETS_KEY: ${{ secrets.DUMMY_ASSETS_KEY }}
          DUMMY_PASSWORD: ${{ secrets.DUMMY_PASSWORD }}
          DUMMY_SERVICE_PASSWORD: ${{ secrets.DUMMY_SERVICE_PASSWORD }}
          CLOUDFLARED_TUNNEL_TOKEN: ${{ secrets[matrix.tunnel_token_secret] }}
          CLOUDFLARED_TUNNEL_URL: ${{ secrets[matrix.tunnel_url_secret] }}
        run: |
          cp .env.sample .env
          sed -i.bak "s|^DUMMY_ASSETS_KEY=.*|DUMMY_ASSETS_KEY=$DUMMY_ASSETS_KEY|" .env && rm .env.bak
          sed -i.bak "s|^DUMMY_PASSWORD=.*|DUMMY_PASSWORD=$DUMMY_PASSWORD|" .env && rm .env.bak
          sed -i.bak "s|^DUMMY_SERVICE_PASSWORD=.*|DUMMY_SERVICE_PASSWORD=$DUMMY_SERVICE_PASSWORD|" .env && rm .env.bak
          sed -i.bak "s|^CLOUDFLARED_TUNNEL_TOKEN=.*|CLOUDFLARED_TUNNEL_TOKEN=$CLOUDFLARED_TUNNEL_TOKEN|" .env && rm .env.bak
          sed -i.bak "s|^CLOUDFLARED_TUNNEL_URL=.*|CLOUDFLARED_TUNNEL_URL=$CLOUDFLARED_TUNNEL_URL|" .env && rm .env.bak
          ./setup.sh --cloudflared

      - name: Run E2E tests
        run: |
          set -a
          source .env
          set +a
          cd sequra
          npx playwright test ${{ matrix.suite }}

      - name: Upload test results
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: test-results-${{ matrix.suite }}
          path: /tmp/test-results
          retention-days: 7

      - name: Collect diagnostics
        if: failure()
        run: |
          mkdir -p /tmp/diagnostics
          docker compose logs --no-color web > /tmp/diagnostics/web.log 2>&1 || true
          docker compose logs --no-color db > /tmp/diagnostics/db.log 2>&1 || true
          docker compose exec -T -u www-data web wp db export - > /tmp/diagnostics/db-dump.sql || true

      - name: Upload diagnostics
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: diagnostics-${{ matrix.suite }}
          path: /tmp/diagnostics
          retention-days: 7
          if-no-files-found: ignore

      - name: Cleanup
        if: always()
        run: ./teardown.sh

  e2e-tests-local:
    needs: [composer, npm]
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false || github.event_name == 'workflow_dispatch'

    strategy:
      matrix:
        suite: ['004', '005', '006']
    steps:
      - uses: actions/checkout@v6

      - name: Use vendor cache (sequra)
        uses: actions/cache@v5
        id: sequra-composer-prod-cache
        with:
          path: |
            sequra/vendor
            sequra/composer.lock
          key: sequra-composer-prod-cache-${{ hashFiles('sequra/composer.lock', 'sequra/src/**/*.php') }}

      - name: Use vendor cache (sequra-helper)
        uses: actions/cache@v5
        id: sequra-helper-composer-prod-cache
        with:
          path: |
            sequra-helper/vendor
            sequra-helper/composer.lock
          key: sequra-helper-composer-prod-cache-${{ hashFiles('sequra-helper/composer.lock', 'sequra-helper/src/**/*.php') }}

      - name: Use node_modules cache
        uses: actions/cache@v5
        id: sequra-npm-cache
        with:
          path: |
            sequra/node_modules
            sequra/package-lock.json
          key: sequra-npm-cache-${{ hashFiles('sequra/package-lock.json') }}

      - name: Use assets cache
        uses: actions/cache@v5
        id: sequra-assets-cache
        with:
          path: |
            sequra/assets
          key: sequra-assets-cache-${{ hashFiles('sequra/package-lock.json', 'sequra/webpack.config.js', 'sequra/assets/index.php', 'sequra/assets/js/**/*.js', 'sequra/assets/css/**/*.scss') }}

      - name: Use Playwright browser cache
        uses: actions/cache@v5
        id: playwright-browser-cache
        with:
          path: |
            /home/runner/.cache/ms-playwright
          key: playwright-browser-cache-${{ hashFiles('sequra/package-lock.json') }}

      - name: Setup the environment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DUMMY_ASSETS_KEY: ${{ secrets.DUMMY_ASSETS_KEY }}
          DUMMY_PASSWORD: ${{ secrets.DUMMY_PASSWORD }}
          DUMMY_SERVICE_PASSWORD: ${{ secrets.DUMMY_SERVICE_PASSWORD }}
        run: |
          cp .env.sample .env
          sed -i.bak "s|^DUMMY_ASSETS_KEY=.*|DUMMY_ASSETS_KEY=$DUMMY_ASSETS_KEY|" .env && rm .env.bak
          sed -i.bak "s|^DUMMY_PASSWORD=.*|DUMMY_PASSWORD=$DUMMY_PASSWORD|" .env && rm .env.bak
          sed -i.bak "s|^DUMMY_SERVICE_PASSWORD=.*|DUMMY_SERVICE_PASSWORD=$DUMMY_SERVICE_PASSWORD|" .env && rm .env.bak
          ./setup.sh

      - name: Run E2E tests
        run: |
          set -a
          source .env
          set +a
          cd sequra
          npx playwright test ${{ matrix.suite }}

      - name: Upload test results
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: test-results-${{ matrix.suite }}
          path: /tmp/test-results
          retention-days: 7

      - name: Collect diagnostics
        if: failure()
        run: |
          mkdir -p /tmp/diagnostics
          docker compose logs --no-color web > /tmp/diagnostics/web.log 2>&1 || true
          docker compose logs --no-color db > /tmp/diagnostics/db.log 2>&1 || true
          docker compose exec -T -u www-data web wp db export - > /tmp/diagnostics/db-dump.sql || true

      - name: Upload diagnostics
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: diagnostics-${{ matrix.suite }}
          path: /tmp/diagnostics
          retention-days: 7
          if-no-files-found: ignore

      - name: Cleanup
        if: always()
        run: ./teardown.sh