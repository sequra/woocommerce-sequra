name: E2E tests

on:
  pull_request:
    types: [synchronize]

concurrency:
  group: e2e-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  composer:
    runs-on: ubuntu-latest
    #if: github.event.pull_request.draft == false

    steps:
      - uses: actions/checkout@v6

      - uses: actions/cache@v5
        id: sequra-composer-prod-cache
        with:
          path: |
            sequra/vendor
            sequra/composer.lock
          key: sequra-composer-prod-cache-${{ hashFiles('sequra/composer.lock') }}

      - name: Composer install
        if: steps.sequra-composer-prod-cache.outputs.cache-hit != 'true'
        run: |
          cd sequra
          composer install --no-dev --quiet --no-interaction

  npm:
    runs-on: ubuntu-latest
    #if: github.event.pull_request.draft == false

    steps:
      - uses: actions/checkout@v6

      - uses: actions/cache@v5
        id: sequra-npm-cache
        with:
          path: |
            sequra/node_modules
            sequra/package-lock.json
          key: sequra-npm-cache-${{ hashFiles('sequra/package-lock.json') }}
      
      - name: NPM install
        if: steps.sequra-npm-cache.outputs.cache-hit != 'true'
        run: |
          cd sequra
          npm install --silent --no-progress --no-update-notifier

      - uses: actions/cache@v5
        id: sequra-assets-cache
        with:
          path: |
            sequra/assets
          key: sequra-assets-cache-${{ github.run_id }}
      
      - name: Build Assets
        if: steps.sequra-assets-cache.outputs.cache-hit != 'true'
        run: |
          cd sequra
          npm run build --silent --no-progress --no-update-notifier

  e2e-tests:
    needs: [composer, npm]
    runs-on: ubuntu-latest
    #if: github.event.pull_request.draft == false
    
    strategy:
      matrix:
        suite: ['001', '002', '003', '004']
        include:
          - suite: '001'
            cloudflared: true
            tunnel_token_secret: CLOUDFLARED_TUNNEL_TOKEN_001
            tunnel_url_secret: CLOUDFLARED_TUNNEL_URL_001
          - suite: '002'
            cloudflared: true
            tunnel_token_secret: CLOUDFLARED_TUNNEL_TOKEN_002
            tunnel_url_secret: CLOUDFLARED_TUNNEL_URL_002
          - suite: '003'
            cloudflared: false
          - suite: '004'
            cloudflared: false

    steps:
      - uses: actions/checkout@v6

      - name: Use vendor cache
        uses: actions/cache@v5
        id: sequra-composer-prod-cache
        with:
          path: |
            sequra/vendor
            sequra/composer.lock
          key: sequra-composer-prod-cache-${{ hashFiles('sequra/composer.lock') }}

      - name: Use node_modules cache
        uses: actions/cache@v5
        id: sequra-npm-cache
        with:
          path: |
            sequra/node_modules
            sequra/package-lock.json
          key: sequra-npm-cache-${{ hashFiles('sequra/package-lock.json') }}
      
      - name: Use assets cache
        uses: actions/cache@v5
        id: sequra-assets-cache
        with:
          path: |
            sequra/assets
          key: sequra-assets-cache-${{ github.run_id }}

      - name: Setup the environment (with cloudflared)
        if: matrix.cloudflared == true
        env:
          DUMMY_ASSETS_KEY: ${{ secrets.DUMMY_ASSETS_KEY }}
          DUMMY_PASSWORD: ${{ secrets.DUMMY_PASSWORD }}
          DUMMY_SERVICE_PASSWORD: ${{ secrets.DUMMY_SERVICE_PASSWORD }}
          CLOUDFLARED_TUNNEL_TOKEN: ${{ secrets[matrix.tunnel_token_secret] }}
          CLOUDFLARED_TUNNEL_URL: ${{ secrets[matrix.tunnel_url_secret] }}
        run: |
          cp .env.sample .env
          sed -i "s|^DUMMY_ASSETS_KEY=.*|DUMMY_ASSETS_KEY=$DUMMY_ASSETS_KEY|" .env
          sed -i "s|^DUMMY_PASSWORD=.*|DUMMY_PASSWORD=$DUMMY_PASSWORD|" .env
          sed -i "s|^DUMMY_SERVICE_PASSWORD=.*|DUMMY_SERVICE_PASSWORD=$DUMMY_SERVICE_PASSWORD|" .env
          sed -i "s|^CLOUDFLARED_TUNNEL_TOKEN=.*|CLOUDFLARED_TUNNEL_TOKEN=$CLOUDFLARED_TUNNEL_TOKEN|" .env
          sed -i "s|^CLOUDFLARED_TUNNEL_URL=.*|CLOUDFLARED_TUNNEL_URL=$CLOUDFLARED_TUNNEL_URL|" .env
          ./setup.sh --cloudflared

      - name: Setup the environment (without cloudflared)
        if: matrix.cloudflared == false
        env:
          DUMMY_ASSETS_KEY: ${{ secrets.DUMMY_ASSETS_KEY }}
          DUMMY_PASSWORD: ${{ secrets.DUMMY_PASSWORD }}
          DUMMY_SERVICE_PASSWORD: ${{ secrets.DUMMY_SERVICE_PASSWORD }}
          PUBLIC_URL: http://host:8080
        run: |
          cp .env.sample .env
          sed -i "s|^DUMMY_ASSETS_KEY=.*|DUMMY_ASSETS_KEY=$DUMMY_ASSETS_KEY|" .env
          sed -i "s|^DUMMY_PASSWORD=.*|DUMMY_PASSWORD=$DUMMY_PASSWORD|" .env
          sed -i "s|^DUMMY_SERVICE_PASSWORD=.*|DUMMY_SERVICE_PASSWORD=$DUMMY_SERVICE_PASSWORD|" .env
          sed -i "s|^PUBLIC_URL=.*|PUBLIC_URL=$PUBLIC_URL|" .env
          ./setup.sh

      - name: Prepare test results directory
        run: |
          sudo rm -rf sequra/test-results
          mkdir -p sequra/test-results

      - name: Run E2E tests
        run: |
          docker run --add-host=host:host-gateway --env-file .env --rm -v ${{ github.workspace }}/sequra:/app -w /app mcr.microsoft.com/playwright:v1.57.0 bash -c "npx playwright test ${{ matrix.suite }} --reporter=dot"

      - name: Upload test results
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: test-results-${{ matrix.suite }}
          path: sequra/test-results
          retention-days: 7 