name: PHP Quality Assurance

on:
  push: {}
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: php-qa-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ---------------------------------
  # 1. Syntax check across PHP versions
  # ---------------------------------
  syntax-lint:
    name: PHP ${{ matrix.php }} syntax check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        php: ['7.3', '7.4', '8.0', '8.1', '8.2', '8.3', '8.4']

    steps:
      - uses: actions/checkout@v6

      - name: Lint PHP files
        run: bin/php-syntax-check --php=${{ matrix.php }}

  # ---------------------------------
  # 2. Install composer dependencies
  # ---------------------------------
  composer-install-sequra:
    name: Install Composer dependencies (sequra)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/cache@v5
        id: sequra-composer-cache
        with:
          path: |
            sequra/vendor
            sequra/composer.lock
          key: sequra-composer-cache-${{ hashFiles('sequra/composer.lock') }}

      - name: Install dependencies
        if: steps.sequra-composer-cache.outputs.cache-hit != 'true'
        run: |
          docker run --rm -v ${{ github.workspace }}/sequra:/app -w /app composer:latest composer install --quiet --no-interaction

  composer-install-sequra-helper:
    name: Install Composer dependencies (sequra-helper)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/cache@v5
        id: sequra-helper-composer-cache
        with:
          path: |
            sequra-helper/vendor
            sequra-helper/composer.lock
          key: sequra-helper-composer-cache-${{ hashFiles('sequra-helper/composer.lock') }}

      - name: Install dependencies
        if: steps.sequra-helper-composer-cache.outputs.cache-hit != 'true'
        run: |
          docker run --rm -v ${{ github.workspace }}/sequra-helper:/app -w /app composer:latest composer install --quiet --no-interaction